<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CDN link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <title>Maxsulot qo'shish</title>
</head>
<body>
    {% include "components/_navbar.html" %}

    <div class="container">
        <h1 class="text-center mt-5 mb-5">Yangi maxsulot qo'shish</h1>

        <form action = "{% url 'add_product' %}" enctype="multipart/form-data" method="post" class="w-50 m-auto d-flex flex-column gap-3">
            {% csrf_token %}
            <input name = "name" type="text" class="form-control" placeholder="Maxsulot nomi" minlenght = "3" required autofocus>
            <input name = "price" min="0" type="number" class="form-control" placeholder="Maxsulot narxi" min = "0" required>
            <input name = "image" type="file" class="form-control" placeholder="Maxsulot rasmi">
            <button class="w-100 btn btn-primary" type="submit">Maxsulotni qo'shish</button>
        </form>
    </div>

</body>
</html>

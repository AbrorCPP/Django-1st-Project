
<!doctype html>
<html lang="en">
 <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Bootstrap CDN link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <title>Document</title>
 </head>
 <body>
  {% include 'components/_navbar.html' %}

  <h1 class="text-center mt-5 mb-2 pt-5">Ro'yxatdan o'tish</h1>

  <form action="{% url 'register_post' %}" method="post" class="w-25 m-auto d-flex flex-column gap-2">
            {% csrf_token %}

            <input name = "first_name" type="text" placeholder="Ism" class="form-control">
            <input name = "last_name"  type="text" placeholder="Familiya" class="form-control">
            <input name = "username"   type="text" placeholder="*Username" required class="form-control">
            <input name = "email"      type="email" placeholder="example@gmail.com" class="form-control">
            <input name = "password1"  type="password" placeholder="*Parol" required class="form-control">
            <input name = "password2"  type="password" placeholder="*Parolni tasdiqlang" required class="form-control">

            <button type="submit" class="btn btn-primary w-100">Ro'yxatdan o'tish</button>
        </form>

  <p class="text-center mt-2">
   Akkauntingiz bormi ? <a href="{% url 'login' %}">Kirish</a>
  </p>

 </body>
</html>

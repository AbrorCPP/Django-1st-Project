<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    background:#0f172a;
    font-family:Arial, sans-serif;
}

.login-container{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.login-box{
    display:flex;
    flex-direction:column;
    background:#1e293b;
    padding:40px;
    border-radius:10px;
    width:300px;
    text-align:center;
    margin-bottom:100px;
}

h2{
    color:white;
    margin-bottom:25px;
    font-family:sans-serif;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#22c55e;
    border:none;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#16a34a;
}

a{
    color:#94a3b8;
    text-decoration:none;
    font-size:14px;
}

</style>
</head>

<body>

{% include 'components/_navbar.html' %}

<div class="login-container">

    <div class="login-box">
        <h2>Login</h2>

        <form method="POST" action="/authorize/">
            {% csrf_token %}
            <input name = "username" type="text" placeholder="Username">
            <input name = "password" type="password" placeholder="Password">
            <button type="submit">Login</button>

            <br><br>

            <a href="#">Forgot password?</a>
        </form>

    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>

<body>

{% include 'components/_navbar.html' %}

{% comment %} <div class="login-container">

    <div class="login-box">
        <h2>Login</h2>

        <form method="POST" action="/authorize/">
            {% csrf_token %}
            <input name = "username" type="text" placeholder="Username">
            <div>
                <input  id = "password" name = "password" type="password" placeholder="Password">
                <button type = button id = "hideOrShowPassword">👁️</button>
            </div>
            <button type="submit" class = "login">Login</button>

            <br><br>

            <a href="#">Forgot password?</a>

            <div>
                <a href= '{% url "register" %}'> Don't have an account? Register</a>
            </div>

        </form>

    </div>
</div> {% endcomment %}

<form class = "m-auto w-25" method="POST" action="/authorize/">
    {% csrf_token %}
    <h2 class="display-5 fw-bold text-center mb-4 text-primary pt-5">
    Tizimga kirish
    </h2>
    <hr class="w-25 mx-auto mb-5">
    <div class="form-group">
        <label for="exampleInputEmail1">Email address</label>
        <input name = "username" type="text" class="form-control" id="exampleInputUsername1" aria-describedby="emailHelp">
    </div>
    <div class="form-group">
        <label for="exampleInputPassword1">Password</label>
        <input name = "password" type="password" class="form-control" id="exampleInputPassword1">
    </div>
    <div class="form-group form-check">
        <input type="checkbox" class="form-check-input" id="exampleCheck1">
        <label class="form-check-label" for="exampleCheck1">Check me out</label>
    </div>
    <button type="submit" class="btn btn-primary">Submit</button>
    <div>
        <p>
        Akkauntingiz yo'qmi unda <a href = {% url 'register' %}> Ro'yxatdan o'ting </a> 
        <p>
    </div>
</form>

</body>
</html>
